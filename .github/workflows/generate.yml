name: Generate SDK
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['openapi.yaml', 'openapitools.json', '.github/workflows/generate.yml']
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate (csharp)
        run: |
          docker run --rm -v "${{ github.workspace }}:/local" \
            openapitools/openapi-generator-cli:v7.10.0 \
            generate -i /local/openapi.yaml -g csharp -o /local \
            --skip-validate-spec \
            --additional-properties=packageName=GriffNode.SDK,targetFramework=net8.0,library=httpclient,packageVersion=0.1.0
      - name: Fix csproj metadata (generator has no URL properties, leaves GIT_USER_ID placeholder)
        run: |
          f=src/GriffNode.SDK/GriffNode.SDK.csproj
          sed -i "s#<Authors>.*</Authors>#<Authors>GriffNode</Authors>#" "$f"
          sed -i "s#<Company>.*</Company>#<Company>GriffNode</Company>#" "$f"
          sed -i "s#<Description>.*</Description>#<Description>Official GriffNode SDK. Non-custodial crypto payment gateway: accept BTC, ETH, LTC, DOGE, DASH and ERC-20 tokens straight to your own wallet.</Description>#" "$f"
          sed -i "s#<RepositoryUrl>.*</RepositoryUrl>#<RepositoryUrl>https://github.com/GriffNode/csharp-sdk.git</RepositoryUrl>#" "$f"
          grep -q "<PackageProjectUrl>" "$f" \
            || sed -i "s#</RepositoryUrl>#</RepositoryUrl>\n    <PackageProjectUrl>https://griffnode.com</PackageProjectUrl>#" "$f"
      - name: Commit regenerated SDK
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: regenerate SDK from openapi.yaml"
          git pull --rebase --autostash
          git push
